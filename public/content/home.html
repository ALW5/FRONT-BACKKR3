<div class="home-content">
  <h2 class="is-center">✏️ Добавить заметку</h2>
  
  <!-- Форма для обычной заметки -->
  <form id="note-form" class="row is-center">
    <input class="col-9" type="text" id="note-input" placeholder="Введите текст заметки..." required>
    <button class="col-3 button primary" type="submit">➕ Добавить</button>
  </form>
  
  <!-- Форма для заметки с напоминанием -->
  <div class="card" style="margin-top: 1.5rem;">
    <h3 class="is-center">⏰ Добавить с напоминанием</h3>
    <form id="reminder-form" class="row" style="margin-top: 1rem;">
      <div class="col-12" style="margin-bottom: 0.5rem;">
        <input type="text" id="reminder-text" placeholder="Текст напоминания..." style="width: 100%;" required>
      </div>
      <div class="col-8">
        <input type="datetime-local" id="reminder-time" style="width: 100%;" required>
      </div>
      <div class="col-4">
        <button class="button success" type="submit" style="width: 100%;">⏰ Добавить</button>
      </div>
    </form>
  </div>
  
  <h2 class="is-center" style="margin-top: 2rem;">📋 Список заметок</h2>
  <ul id="notes-list" style="list-style: none; padding-left: 0;"></ul>
  
  <div class="is-center" style="margin-top: 1rem;">
    <small>💡 Заметки сохраняются локально и работают офлайн</small>
  </div>
</div>
